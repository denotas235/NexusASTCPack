name: Build NexusASTCPack

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Download astcenc (x86_64 AVX2 for CI — ARM64 is for the device) ───
      - name: Download astcenc 4.8.0 (Linux x86_64)
        run: |
          curl -fsSL \
            "https://github.com/ARM-software/astc-encoder/releases/download/4.8.0/astcenc-4.8.0-linux-x86_64.zip" \
            -o astcenc.zip
          unzip -q astcenc.zip -d astcenc_tools
          # The zip may put the binary in different sub-paths depending on release
          ASTCENC_BIN=$(find astcenc_tools -name "astcenc-avx2" -o -name "astcenc" 2>/dev/null | head -1)
          chmod +x "$ASTCENC_BIN"
          echo "ASTCENC_PATH=$ASTCENC_BIN" >> $GITHUB_ENV
          echo "astcenc found: $ASTCENC_BIN"
          "$ASTCENC_BIN" --version || true

      # ── Trigger Loom to download MC JARs ──────────────────────────────────
      - name: Download Minecraft assets (via Loom)
        run: ./gradlew downloadAssets --no-daemon
        env:
          ASTCENC_PATH: ""   # skip conversion here; MC JAR not needed yet

      # ── Find the MC client JAR in Gradle cache ─────────────────────────────
      - name: Locate MC client JAR
        run: |
          MC_JAR=$(find ~/.gradle/caches -name "*.jar" 2>/dev/null \
            | xargs -I{} sh -c 'jar tf {} 2>/dev/null | grep -q "assets/minecraft/textures/block/stone.png" && echo {}' \
            | head -1)
          if [[ -z "$MC_JAR" ]]; then
            echo "MC client JAR not found in Gradle cache — trying fallback download"
            # Fallback: trigger full generate-sources to get client jar
            ./gradlew generateSources --no-daemon 2>/dev/null || true
            MC_JAR=$(find ~/.gradle/caches -name "*.jar" 2>/dev/null \
              | xargs -I{} sh -c 'jar tf {} 2>/dev/null | grep -q "assets/minecraft/textures/block/stone.png" && echo {}' \
              | head -1)
          fi
          echo "MC_JAR=$MC_JAR" >> $GITHUB_ENV
          echo "MC client JAR: $MC_JAR"

      # ── Convert vanilla textures to ASTC ──────────────────────────────────
      - name: Convert textures to ASTC
        run: |
          chmod +x precompile/convert_textures.sh
          if [[ -z "$MC_JAR" || ! -f "$MC_JAR" ]]; then
            echo "Skipping texture conversion — MC JAR not found"
            mkdir -p src/main/resources/assets/nexusastcpack
            echo '{"version":1,"entries":[]}' > src/main/resources/assets/nexusastcpack/astc_index.json
          else
            precompile/convert_textures.sh \
              "$MC_JAR" \
              "$ASTCENC_PATH" \
              "src/main/resources/assets/minecraft/textures" \
              "src/main/resources/assets/nexusastcpack/astc_index.json"
          fi

      # ── Build the mod ──────────────────────────────────────────────────────
      - name: Build mod JAR
        run: ./gradlew build --no-daemon
        env:
          ASTCENC_PATH: ""   # already converted above; skip duplicate conversion

      # ── Verify the output ─────────────────────────────────────────────────
      - name: Verify JAR contents
        run: |
          JAR=$(find build/libs -name "NexusASTCPack-*.jar" ! -name "*-sources.jar" | head -1)
          echo "JAR: $JAR"
          echo "--- fabric.mod.json ---"
          jar xf "$JAR" fabric.mod.json -C /tmp && cat /tmp/fabric.mod.json 2>/dev/null || \
            unzip -p "$JAR" fabric.mod.json
          echo ""
          ASTC_COUNT=$(jar tf "$JAR" | grep -c '\.astc$' || echo 0)
          echo "Bundled ASTC textures: $ASTC_COUNT"

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload NexusASTCPack JAR
        uses: actions/upload-artifact@v4
        with:
          name: NexusASTCPack
          path: |
            build/libs/NexusASTCPack-*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
