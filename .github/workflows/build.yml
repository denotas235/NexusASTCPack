name: Build NexusASTCPack

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── astcenc 5.4.0 (Linux x64 AVX2) — non-fatal if download fails ──────
      - name: Download astcenc 5.4.0 (Linux x64)
        continue-on-error: true
        run: |
          curl -fsSL \
            "https://github.com/ARM-software/astc-encoder/releases/download/5.4.0/astcenc-5.4.0-linux-x64.zip" \
            -o astcenc.zip
          unzip -q astcenc.zip -d astcenc_tools
          # Binary is at bin/astcenc-avx2 inside the zip
          ASTCENC_BIN="$(pwd)/astcenc_tools/bin/astcenc-avx2"
          chmod +x "$ASTCENC_BIN"
          echo "ASTCENC_PATH=$ASTCENC_BIN" >> $GITHUB_ENV
          echo "astcenc version: $("$ASTCENC_BIN" --version 2>&1 | head -1)"

      # Ensure ASTCENC_PATH is set (may be empty if download failed)
      - name: Check astcenc availability
        run: |
          if [[ -n "${ASTCENC_PATH:-}" && -x "$ASTCENC_PATH" ]]; then
            echo "astcenc available: $ASTCENC_PATH"
          else
            echo "astcenc not available — build will proceed without bundled ASTC textures"
            echo "ASTCENC_PATH=" >> $GITHUB_ENV
          fi

      # ── Trigger Loom to download MC JARs ──────────────────────────────────
      - name: Download Minecraft assets (via Loom)
        run: ./gradlew downloadAssets --no-daemon

      # ── Find the MC client JAR in Gradle cache ─────────────────────────────
      - name: Locate MC client JAR
        run: |
          echo "Searching for MC client JAR..."
          MC_JAR=$(find ~/.gradle/caches -name "*.jar" 2>/dev/null \
            | while read f; do
                if jar tf "$f" 2>/dev/null | grep -q "assets/minecraft/textures/block/stone.png"; then
                  echo "$f"; break
                fi
              done)
          if [[ -z "$MC_JAR" ]]; then
            echo "MC client JAR not found — skipping texture conversion"
          else
            echo "Found: $MC_JAR"
          fi
          echo "MC_JAR=${MC_JAR}" >> $GITHUB_ENV

      # ── Convert vanilla textures to ASTC (skipped if no astcenc or no JAR) ─
      - name: Convert vanilla textures to ASTC
        run: |
          chmod +x precompile/convert_textures.sh
          if [[ -z "${ASTCENC_PATH:-}" || -z "${MC_JAR:-}" || ! -f "${MC_JAR:-}" ]]; then
            echo "Skipping texture conversion (astcenc=${ASTCENC_PATH:-none} mc_jar=${MC_JAR:-none})"
            mkdir -p src/main/resources/assets/nexusastcpack
            echo '{"version":1,"entries":[]}' > src/main/resources/assets/nexusastcpack/astc_index.json
          else
            precompile/convert_textures.sh \
              "$MC_JAR" \
              "$ASTCENC_PATH" \
              "src/main/resources/assets/minecraft/textures" \
              "src/main/resources/assets/nexusastcpack/astc_index.json"
          fi

      # ── Build the mod ──────────────────────────────────────────────────────
      - name: Build mod JAR
        run: ./gradlew build --no-daemon
        env:
          ASTCENC_PATH: ""   # already converted above; skip duplicate in Gradle task

      # ── Verify the output ─────────────────────────────────────────────────
      - name: Verify JAR contents
        run: |
          JAR=$(find build/libs -name "NexusASTCPack-*.jar" ! -name "*-sources.jar" | head -1)
          echo "Built JAR: $JAR ($(du -sh "$JAR" | cut -f1))"
          ASTC_COUNT=$(jar tf "$JAR" | grep -c '\.astc$' || echo 0)
          echo "Bundled ASTC textures: $ASTC_COUNT"
          echo "--- fabric.mod.json ---"
          jar xf "$JAR" fabric.mod.json && cat fabric.mod.json

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload NexusASTCPack JAR
        uses: actions/upload-artifact@v4
        with:
          name: NexusASTCPack
          path: |
            build/libs/NexusASTCPack-*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
